name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/roziw/dockerassignment:latest
            ghcr.io/roziw/dockerassignment:${{ github.sha }}

      - name: Update README with latest build info
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          sed -i "s|<!-- BUILD_INFO_START -->.*<!-- BUILD_INFO_END -->|<!-- BUILD_INFO_START -->**Latest build:** \`$SHORT_SHA\` — $BUILD_TIME<!-- BUILD_INFO_END -->|" README.md

      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: update build info [skip ci]"
          git push