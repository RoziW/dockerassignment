name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dockerassignment:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dockerassignment:${{ github.sha }}

      - name: Append build to changelog
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          SAFE_MSG=$(echo "$COMMIT_MSG" | head -n1 | tr '|' '-')
          sed -i "/<!-- BUILD_LOG -->/a | \`$SHORT_SHA\` | $SAFE_MSG | $BUILD_TIME |" README.md
      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: update build info [skip ci]"
          git push